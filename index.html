<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puter AI | Dark Edition</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        :root {
            --bg: #0f111a;
            --card-bg: #1a1d2b;
            --accent: #4f46e5;
            --accent-glow: rgba(79, 70, 229, 0.4);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --user-bubble: #2d3748;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #app-container {
            width: 90%;
            max-width: 900px;
            height: 85vh;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header {
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 10px; height: 10px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
        }

        #chat-window {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar */
        #chat-window::-webkit-scrollbar { width: 6px; }
        #chat-window::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        .msg {
            max-width: 80%;
            padding: 14px 20px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 15px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .ai {
            align-self: flex-start;
            background: rgba(255,255,255,0.05);
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .user {
            align-self: flex-end;
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .input-wrapper {
            padding: 25px 30px;
            display: flex;
            gap: 15px;
            background: rgba(0,0,0,0.2);
        }

        input {
            flex: 1;
            background: #0f111a;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 14px 20px;
            color: white;
            font-size: 16px;
            transition: border 0.2s;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        button {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0 25px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.5; }
    </style>
</head>
<body>

<div id="app-container">
    <header>
        <div class="status-dot"></div>
        <div style="font-weight: bold; letter-spacing: 0.5px;">PUTER AI <span style="color: var(--text-muted); font-weight: normal; font-size: 12px; margin-left: 10px;">V2.0</span></div>
    </header>

    <div id="chat-window">
        <div class="msg ai">Systems online. How can I assist you in the dark today?</div>
    </div>

    <div class="input-wrapper">
        <input type="text" id="prompt" placeholder="Message Puter AI..." autocomplete="off">
        <button id="sendBtn">Send</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const promptInput = document.getElementById('prompt');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.textContent = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function askAI() {
        const query = promptInput.value.trim();
        if(!query) return;

        addMessage(query, 'user');
        promptInput.value = '';
        sendBtn.disabled = true;

        // Visual "Thinking" state
        const thinkingDiv = document.createElement('div');
        thinkingDiv.className = 'msg ai';
        thinkingDiv.textContent = '...';
        chatWindow.appendChild(thinkingDiv);

        try {
            // Using Puter.js AI Chat
            const response = await puter.ai.chat(query);
            chatWindow.removeChild(thinkingDiv);
            addMessage(response, 'ai');
        } catch (err) {
            chatWindow.removeChild(thinkingDiv);
            addMessage("Error connecting to Puter. Make sure you are running this on a server (like Live Server) and not as a local file.", "ai");
            console.error(err);
        } finally {
            sendBtn.disabled = false;
        }
    }

    sendBtn.onclick = askAI;
    promptInput.onkeypress = (e) => { if(e.key === 'Enter') askAI(); };
</script>

</body>
</html>
