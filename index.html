<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puter AI | Dark Edition</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        :root {
            --bg: #0b0e14;
            --card-bg: #161b22;
            --accent: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.3);
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #app-container {
            width: 95%;
            max-width: 800px;
            height: 90vh;
            background: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 15px 25px;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .status { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .dot { width: 8px; height: 8px; background: #238636; border-radius: 50%; box-shadow: 0 0 8px #238636; }

        #chat-window {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .ai { background: #21262d; border: 1px solid #30363d; align-self: flex-start; }
        .user { background: #238636; color: white; align-self: flex-end; }

        .input-area {
            padding: 20px;
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.1);
        }

        input {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px;
            color: white;
            outline: none;
        }

        button {
            background: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 0 20px;
            cursor: pointer;
            font-weight: bold;
        }

        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

<div id="app-container">
    <header>
        <div class="status"><div class="dot"></div> Puter AI Live</div>
        <div style="font-size: 12px; color: var(--text-muted)">GitHub Pages Hosting</div>
    </header>

    <div id="chat-window" id="chatWindow">
        <div class="msg ai" id="welcome-msg">Connecting to Puter...</div>
    </div>

    <div class="input-area">
        <input type="text" id="prompt" placeholder="Ask something..." autocomplete="off">
        <button id="sendBtn" disabled>Send</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const promptInput = document.getElementById('prompt');
    const sendBtn = document.getElementById('sendBtn');
    const welcomeMsg = document.getElementById('welcome-msg');

    // 1. AUTO-LOGIN ON LOAD
    (async () => {
        try {
            if (!puter.auth.isSignedIn()) {
                welcomeMsg.textContent = "Please allow the popup to connect to AI...";
                await puter.auth.signIn();
            }
            welcomeMsg.textContent = "Connected! I'm ready to chat.";
            sendBtn.disabled = false;
        } catch (e) {
            welcomeMsg.textContent = "Connection failed. Please allow popups and refresh.";
        }
    })();

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.textContent = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        return div;
    }

    async function typeWriter(text, element) {
        element.textContent = "";
        for (let i = 0; i < text.length; i++) {
            element.textContent += text.charAt(i);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            await new Promise(r => setTimeout(r, 15));
        }
    }

    async function askAI() {
        const query = promptInput.value.trim();
        if(!query) return;

        addMessage(query, 'user');
        promptInput.value = '';
        sendBtn.disabled = true;

        const aiDiv = addMessage('...', 'ai');

        try {
            const response = await puter.ai.chat(query);
            await typeWriter(response, aiDiv);
        } catch (err) {
            aiDiv.textContent = "Error: Click 'Send' again or refresh the page.";
            console.error(err);
        } finally {
            sendBtn.disabled = false;
        }
    }

    sendBtn.onclick = askAI;
    promptInput.onkeypress = (e) => { if(e.key === 'Enter') askAI(); };
</script>

</body>
</html>
